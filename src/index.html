<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ThreeJS Launcher</title>

<style>
* { margin: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #fff; font-family: monospace; }

/* MENU = GRID */
#menu {
  position: fixed; inset: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 1fr;
  gap: 1px;
  background: #111;
}

/* CASE */
.tab {
  position: relative;
  cursor: pointer;
  overflow: hidden;
  background: #0a0a0f;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

/* IMAGE */
.tab img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 1;
  transition: transform .4s, opacity .3s;
}

.tab:hover img {
  transform: scale(1.08);
  opacity: 1;
}

/* FALLBACK */
.thumb-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  color: #222;
}

/* LABEL */
.tab-label {
  position: relative;
  padding: 10px;
  font-size: 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: #aaa;
  transition: color .2s;
}

.tab:hover .tab-label {
  color: #6af;
}

/* ACTIVE */
.tab.active::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 2px solid #6af;
}

/* CANVAS FULLSCREEN */
#canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  display: none;
  z-index: 50;
}

#close {
  position: fixed; top: 16px; right: 16px; z-index: 60;
  background: rgba(0,0,0,.6);
  border: 1px solid #555;
  color: #fff;
  padding: 8px 14px;
  cursor: pointer;
  font-family: monospace;
  border-radius: 4px;
  display: none;
}

#close:hover {
  border-color: #6af;
  color: #6af;
}
</style>
</head>

<body>

<div id="menu"></div>

<canvas id="canvas"></canvas>
<button id="close" onclick="closeScene()">✕ Retour</button>

<script type="module">
let cleanup = null
let activeTab = null

const menu = document.getElementById('menu')

// 🔥 génération grille 15 scènes
for (let i = 1; i <= 11; i++) {
  const num = String(i).padStart(2, '0')

  const div = document.createElement('div')
  div.className = 'tab'

  div.innerHTML = `
    <img src="/previews/scene${i}.png"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="thumb-placeholder" style="display:none">◈</div>
    <div class="tab-label">${num} — Scene ${i}</div>
  `

  div.onclick = () => loadScene(`scene${i}`, div)

  menu.appendChild(div)
}

async function loadScene(name, tabEl) {
  if (activeTab) activeTab.classList.remove('active')
  tabEl.classList.add('active')
  activeTab = tabEl

  if (cleanup) {
    cleanup()
    cleanup = null
  }

  try {
    const module = await import(`./scripts/${name}.js`)
    
    const canvas = document.getElementById('canvas')
    canvas.style.display = 'block'
    document.getElementById('close').style.display = 'block'

    if (module.default) {
      cleanup = module.default(canvas)
    }
  } catch (error) {
    console.error(`Erreur au chargement de ${name}:`, error)
    alert(`Impossible de charger ${name}`)
  }
}

function closeScene() {
  if (cleanup) {
    cleanup()
    cleanup = null
  }

  if (activeTab) {
    activeTab.classList.remove('active')
    activeTab = null
  }

  document.getElementById('canvas').style.display = 'none'
  document.getElementById('close').style.display = 'none'
}
</script>

</body>
</html>
